<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アークナイツ 育成記録</title>
  <style>
    body { background-color: #1e1e1e; color: #e0e0e0; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; }
    
    .sticky-top {
      position: sticky; top: 0; z-index: 100;
      background-color: #1e1e1e; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    header { 
      background-color: #111; padding: 10px 20px; 
      display: flex; justify-content: space-between; align-items: center; 
      border-bottom: 2px solid #00a8ff; 
    }
    h1 { margin: 0; font-size: 1.3rem; letter-spacing: 2px; }
    
    .header-btns { display: flex; gap: 8px; }
    
    .summary-btn { 
      background-color: transparent; color: #00a8ff; 
      border: 1px solid #00a8ff; padding: 6px 10px; 
      border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; 
      transition: 0.2s; white-space: nowrap;
    }
    .summary-btn:active { background-color: #00a8ff; color: #000; transform: scale(0.95); }

    .tabs { 
      display: flex; overflow-x: auto; background-color: #2a2a2a; 
      padding: 6px 4px; gap: 4px; white-space: nowrap; justify-content: center; 
    }
    .tab-btn { background-color: #444; color: #fff; border: none; padding: 8px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
    .tab-btn.active { background-color: #00a8ff; color: #000; }
    
    .filter-bar {
      display: flex; justify-content: center; gap: 6px; background-color: #1a1a1a; padding: 6px; border-bottom: 1px solid #333;
    }
    .filter-btn {
      background-color: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; font-weight: bold;
    }
    .filter-btn.active {
      background-color: #fff; color: #000; border-color: #fff;
    }

    .container { padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    
    .card { background-color: #2d2d2d; border: 1px solid #444; border-radius: 6px; padding: 10px 12px; position: relative; display: flex; flex-direction: column; }
    .card-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 4px; margin-bottom: 8px; gap: 4px 8px; }
    
    .op-name-block { display: flex; flex-direction: column; }
    .op-name { font-size: 1.05rem; font-weight: bold; color: #fff; word-break: keep-all; }
    .op-stars { font-size: 0.7rem; margin-top: 2px; }
    .stars-6 { color: #ff9f43; text-shadow: 0 0 3px rgba(255,159,67,0.5); }
    .stars-5 { color: #feca57; }
    .stars-low { color: #95a5a6; }

    .op-badges { font-size: 0.8rem; color: #bbb; display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .highlight { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px rgba(0, 168, 255, 0.8); }
    
    .card-body { display: flex; gap: 8px; margin-top: auto; }
    .module-box { flex: 0 0 35%; background-color: #1a1a1a; border: 1px solid #333; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4px 2px; }
    .module-label { font-size: 0.65rem; color: #888; }
    .module-value { font-size: 0.9rem; text-align: center; line-height: 1.2; }
    .skills-box { flex: 1; background-color: #1a1a1a; border: 1px solid #333; border-radius: 4px; display: flex; justify-content: space-around; align-items: center; padding: 4px 0; }
    .skill-item { text-align: center; font-size: 0.95rem; }
    .skill-label { font-size: 0.65rem; color: #888; display: block; }
    
    .stat-row { display: grid; grid-template-columns: 1fr 45px 20px; gap: 4px; font-size: 0.85rem; margin-bottom: 4px; align-items: center; }
    .stat-row > span:nth-child(1) { color: #bbb; }
    .stat-row > span:nth-child(2) { text-align: right; font-weight: bold; font-variant-numeric: tabular-nums; }
    .stat-row > span:nth-child(3) { text-align: left; color: #888; font-size: 0.8rem; }
    
    .total-card { border: 1px solid #00a8ff; }
    .history-card { background-color: #2d2d2d; border-left: 4px solid #00a8ff; border-radius: 6px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .history-time { font-size: 0.85rem; color: #bbb; }
    .history-name { font-size: 1.05rem; font-weight: bold; color: #fff; }
    .empty-msg { text-align: center; color: #888; padding: 20px; width: 100%; }

    .req-icon { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background-color: #444; color: #00a8ff; border: 1px solid #00a8ff; border-radius: 4px; padding: 1px 6px; margin-left: 6px; font-size: 0.85rem; transition: 0.2s; }
    .req-icon:active { transform: scale(0.9); background-color: #00a8ff; color: #000; }
    .loading { text-align: center; padding: 30px; color: #888; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .modal-content { background-color: #222; border: 1px solid #00a8ff; border-radius: 8px; padding: 20px; text-align: center; min-width: 260px; max-width: 80%; box-shadow: 0 4px 15px rgba(0, 168, 255, 0.2); }
    .modal-msg { margin-bottom: 20px; font-size: 1rem; color: #fff; line-height: 1.5; }
    .modal-btns { display: flex; justify-content: center; gap: 15px; }
    .modal-btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; font-size: 0.95rem; }
    .btn-cancel { background: #444; color: #ccc; }
    .btn-confirm { background: #00a8ff; color: #000; }

    @media (min-width: 600px) {
      .card-header { flex-direction: column; align-items: flex-start; }
      .op-badges { margin-left: 0; margin-top: 4px; }
    }
  </style>
</head>
<body>

  <div class="sticky-top">
    <header>
      <h1>アークナイツ 育成記録</h1>
      <div class="header-btns">
        <button class="summary-btn" onclick="toggleSpecialView('履歴')">履歴</button>
        <button class="summary-btn" onclick="toggleSpecialView('集計')">集計</button>
      </div>
    </header>
    <div class="tabs" id="tabContainer"></div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setRarityFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setRarityFilter('6', this)">★6</button>
      <button class="filter-btn" onclick="setRarityFilter('5', this)">★5</button>
      <button class="filter-btn" onclick="setRarityFilter('low', this)">★4以下</button>
    </div>
  </div>

  <div id="loading" class="loading">データを取得中...</div>
  <div class="container" id="cardContainer"></div>

  <div id="customModal" class="modal-overlay">
    <div class="modal-content">
      <div id="modalMessage" class="modal-msg">メッセージ</div>
      <div id="modalButtons" class="modal-btns"></div>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚠️ ご自身の環境のURLに書き換えてください
    // ==========================================
    const GAS_URL = "ここに新しくデプロイした全レアリティ対応GASのウェブアプリURLを貼り付け";
    const GCF_URL = "ここにCloud Runデプロイ後に発行されたService URLを貼り付け";
    
    const COOLDOWN_MS = 3 * 60 * 1000;

    let opData = {};
    let isTabsCreated = false;
    let lastClass = "先鋒"; 
    let currentView = "先鋒";
    let currentRarityFilter = "all";

    async function fetchData() {
      const cachedData = localStorage.getItem("arknightsRosterCacheAll");
      if (cachedData) {
        opData = JSON.parse(cachedData);
        document.getElementById("loading").style.display = "none";
        createTabs();
        renderCards("先鋒");
      }
      try {
        const response = await fetch(GAS_URL);
        if (!response.ok) throw new Error("Network Error");
        const newData = await response.json();
        if (JSON.stringify(opData) !== JSON.stringify(newData)) {
          opData = newData;
          localStorage.setItem("arknightsRosterCacheAll", JSON.stringify(newData));
          document.getElementById("loading").style.display = "none";
          createTabs();
          const activeTabBtn = document.querySelector(".tab-btn.active");
          const tabName = activeTabBtn ? activeTabBtn.innerText : "先鋒";
          if (currentView !== "集計" && currentView !== "履歴") renderCards(tabName);
        }
      } catch (e) { 
        console.error(e);
        if (!cachedData) {
          document.getElementById("loading").innerText = "データの取得に失敗しました。再読み込みしてください。";
        }
      }
    }

    function createTabs() {
      if (isTabsCreated) return;
      const tabContainer = document.getElementById("tabContainer");
      let htmlString = "";
      const classes = ["先鋒", "前衛", "重装", "狙撃", "術師", "医療", "補助", "特殊"];
      classes.forEach((cls, index) => {
        const isActive = index === 0 ? " active" : "";
        htmlString += `<button class="tab-btn${isActive}" onclick="switchTab('${cls}', this)">${cls}</button>`;
      });
      tabContainer.innerHTML = htmlString;
      isTabsCreated = true;
    }

    function switchTab(cls, btnElement) {
      lastClass = cls;
      currentView = cls;
      document.getElementById("filterBar").style.display = "flex";
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      if(btnElement) btnElement.classList.add("active");
      window.scrollTo({ top: 0, behavior: 'smooth' });
      renderCards(cls);
    }

    // レアリティフィルター
    function setRarityFilter(filterType, btnElement) {
      currentRarityFilter = filterType;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      if(btnElement) btnElement.classList.add("active");
      if (currentView !== "集計" && currentView !== "履歴") {
        renderCards(currentView);
      }
    }

    function toggleSpecialView(viewName) {
      if (currentView === viewName) {
        const tabs = document.querySelectorAll(".tab-btn");
        let targetBtn;
        tabs.forEach(b => { if (b.innerText === lastClass) targetBtn = b; });
        switchTab(lastClass, targetBtn);
      } else {
        currentView = viewName;
        document.getElementById("filterBar").style.display = "none";
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (viewName === "集計") renderSummary();
        if (viewName === "履歴") renderHistory();
      }
    }

    function showModal(msg, isConfirm, onConfirmCallback) {
      const modal = document.getElementById("customModal");
      const msgDiv = document.getElementById("modalMessage");
      const btnsDiv = document.getElementById("modalButtons");
      msgDiv.innerHTML = msg;
      if (isConfirm) {
        btnsDiv.innerHTML = `<button class="modal-btn btn-cancel" onclick="closeModal()">キャンセル</button><button class="modal-btn btn-confirm" id="confirmBtn">リクエスト</button>`;
        document.getElementById("confirmBtn").onclick = () => { onConfirmCallback(); };
      } else {
        btnsDiv.innerHTML = `<button class="modal-btn btn-confirm" onclick="closeModal()">OK</button>`;
      }
      modal.style.display = "flex";
    }

    function closeModal() { document.getElementById("customModal").style.display = "none"; }

    function requestSupport(opName) {
      const lastReqTime = localStorage.getItem("lastSupportRequestTimeAll");
      if (lastReqTime && (Date.now() - parseInt(lastReqTime)) < COOLDOWN_MS) {
        const remainSec = Math.ceil((COOLDOWN_MS - (Date.now() - parseInt(lastReqTime))) / 1000);
        showModal(`連続送信は制限されています。<br>あと ${remainSec} 秒お待ちください。`, false);
        return;
      }
      showModal(`「${opName}」をサポートに出すよう<br>リクエストしますか？`, true, () => {
        showModal("⏳ 送信中...", false);
        fetch(GCF_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ opName: opName })
        }).then(res => {
          if (res.ok) {
            localStorage.setItem("lastSupportRequestTimeAll", Date.now().toString());
            showModal("✅ リクエストを送信しました！", false);
            if(currentView === "履歴" || currentView === "集計") {
               fetchData();
            }
          } else {
            showModal("❌ 送信に失敗しました。<br>3分間の制限中か、時間をおいてお試しください。", false);
          }
        }).catch(() => { showModal("❌ 通信エラーが発生しました。", false); });
      });
    }

    function renderSummary() {
      const container = document.getElementById("cardContainer");
      let htmlString = "";
      (opData["集計"] || []).forEach(row => {
        const isTotal = row["職"] === "全職合計";
        const m3Rate = typeof row["特化3率"] === 'number' ? (row["特化3率"] * 100).toFixed(1) : (row["特化3率"] || "0.0");
        const potRate = typeof row["完凸率"] === 'number' ? (row["完凸率"] * 100).toFixed(1) : (row["完凸率"] || "0.0");

        htmlString += `
          <div class="card ${isTotal ? 'total-card' : ''}">
            <div class="card-header"><div class="op-name" style="${isTotal ? 'color:#00a8ff' : ''}">${row["職"]}</div></div>
            <div class="stat-row"><span>人数:</span><span>${row["人数"] || 0}</span><span>名</span></div>
            <div class="stat-row"><span>特化3スキル数:</span><span>${row["特化3スキル数"] || 0}</span><span>個</span></div>
            <div class="stat-row"><span>特化3率:</span><span>${m3Rate}</span><span>%</span></div>
            <div class="stat-row"><span>全特化人数:</span><span>${row["全特化人数"] || 0}</span><span>名</span></div>
            <div class="stat-row"><span>完凸人数:</span><span>${row["完凸人数"] || 0}</span><span>名</span></div>
            <div class="stat-row"><span>完凸率:</span><span>${potRate}</span><span>%</span></div>
          </div>`;
      });
      container.innerHTML = htmlString;
    }

    function renderHistory() {
      const container = document.getElementById("cardContainer");
      let htmlString = "";
      const historyList = opData["履歴"] || [];
      if (historyList.length === 0) {
        htmlString = `<div class="empty-msg">まだリクエスト履歴がありません</div>`;
      } else {
        historyList.forEach(log => {
          htmlString += `
            <div class="history-card">
              <span class="history-time">${log.time}</span>
              <span class="history-name">${log.name}</span>
            </div>`;
        });
      }
      container.innerHTML = htmlString;
    }

    function renderCards(className) {
      const container = document.getElementById("cardContainer");
      let htmlString = "";
      let list = opData[className] || [];

      if (currentRarityFilter === "6") {
        list = list.filter(op => parseInt(op["レア"]) === 6);
      } else if (currentRarityFilter === "5") {
        list = list.filter(op => parseInt(op["レア"]) === 5);
      } else if (currentRarityFilter === "low") {
        list = list.filter(op => parseInt(op["レア"]) <= 4);
      }

      if (list.length === 0) {
        container.innerHTML = `<div class="empty-msg">該当するオペレーターはいません</div>`;
        return;
      }

      list.forEach(op => {
        const rarityNum = parseInt(op["レア"], 10) || 0;
        
        let starHTML = "";
        if (rarityNum === 6) {
          starHTML = `<span class="op-stars stars-6">${"★".repeat(6)}</span>`;
        } else if (rarityNum === 5) {
          starHTML = `<span class="op-stars stars-5">${"★".repeat(5)}</span>`;
        } else {
          starHTML = `<span class="op-stars stars-low">${"★".repeat(rarityNum)}</span>`;
        }

        const pot = op["潜在"] >= 6 ? `<span class="highlight">完凸</span>(${op["潜在"]})` : (op["潜在"] || "-");
        
        let mods = [];
        ["X","Y","Δ","α"].forEach(m => { if(op[m] && op[m] !== "-") mods.push(m+op[m]); });
        
        const safeOpName = op["オペレーター名"].replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        const s1HTML = op["S1"] == 3 ? '<span class="highlight">M3</span>' : (op["S1"] || "-");
        const s2HTML = op["S2"] == 3 ? '<span class="highlight">M3</span>' : (op["S2"] || "-");
        const s3HTML = op["S3"] == 3 ? '<span class="highlight">M3</span>' : (op["S3"] || "-");

        // ★新機能：昇進データの数字（0, 1, 2）をWEB表示用に装飾
        const promoteNum = op["昇進"];
        let promoteHTML = "";
        if (promoteNum === "-") {
          promoteHTML = "<span>-</span>";
        } else {
          promoteHTML = `<span>昇進<span class="highlight">${promoteNum}</span></span>`;
        }

        htmlString += `
          <div class="card">
            <div class="card-header">
              <div class="op-name-block">
                <div class="op-name">${op["オペレーター名"]}</div>
                ${starHTML}
              </div>
              <div class="op-badges">
                ${promoteHTML}
                <span>Lv<span class="highlight">${op["Lv"] || "-"}</span></span>
                <span>潜在:${pot}<span class="req-icon" onclick="requestSupport('${safeOpName}')">👤+</span></span>
              </div>
            </div>
            <div class="card-body">
              <div class="module-box"><span class="module-label">MOD</span><span class="module-value">${mods.length?`<span class="highlight">${mods.join("/")}</span>`:"-"}</span></div>
              <div class="skills-box">
                <div class="skill-item"><span class="skill-label">S1</span>${s1HTML}</div>
                <div class="skill-item"><span class="skill-label">S2</span>${s2HTML}</div>
                <div class="skill-item"><span class="skill-label">S3</span>${s3HTML}</div>
              </div>
            </div>
          </div>`;
      });
      container.innerHTML = htmlString;
    }
    window.onload = fetchData;
  </script>
</body>
</html>
